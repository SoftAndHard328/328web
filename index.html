<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Discord OAuth2 橋接</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .login-btn {
            background: #5865F2;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 20px auto;
        }
        .login-btn:hover {
            background: #4752C4;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(88, 101, 242, 0.4);
        }
        .download-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .download-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .divider {
            margin: 25px 0;
            border-top: 1px solid #eee;
            position: relative;
        }
        .divider::before {
            content: "或";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 0 15px;
            color: #999;
            font-size: 12px;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .code-display {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            margin-top: 15px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Discord 截圖同步</h1>
        <p class="subtitle">點擊下方按鈕登入 Discord 帳號</p>
        
        <button class="login-btn" onclick="discordLogin()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
            </svg>
            使用 Discord 登入
        </button>
        
        <div class="divider"></div>
        
        <a href="/download" class="download-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            下載桌面應用程式
        </a>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        // Discord OAuth2 配置
        const CLIENT_ID = '1487435226090176624';
        const REDIRECT_URI = 'https://328web.vercel.app/';
        
        function discordLogin() {
            const state = generateState();
            localStorage.setItem('oauth_state', state);
            
            // 使用 Implicit Grant (response_type=token) 直接獲取 access token
            const params = new URLSearchParams({
                client_id: CLIENT_ID,
                redirect_uri: REDIRECT_URI,
                response_type: 'token',
                scope: 'identify',
                state: state
            });
            
            window.location.href = `https://discord.com/api/v10/oauth2/authorize?${params}`;
        }
        
        function generateState() {
            const array = new Uint8Array(32);
            crypto.getRandomValues(array);
            return Array.from(array, byte => byte.toString(16).padStart(2, '0')).join('');
        }
        
        // 檢查是否從 Discord 回調
        window.onload = async function() {
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const accessToken = hashParams.get('access_token');
            const tokenType = hashParams.get('token_type');
            const state = hashParams.get('state');
            const error = hashParams.get('error');
            
            if (error) {
                showStatus('授權失敗: ' + error, 'error');
                return;
            }
            
            if (accessToken && state) {
                const savedState = localStorage.getItem('oauth_state');
                if (state !== savedState) {
                    showStatus('安全驗證失敗，請重試', 'error');
                    return;
                }
                
                try {
                    const userInfo = await fetchUserInfo(accessToken);
                    
                    showStatus('授權成功！', 'success');
                    
                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'code-display';
                    infoDiv.innerHTML = `
                        <strong>用戶名:</strong> ${userInfo.username}#${userInfo.discriminator}<br>
                        <strong>用戶 ID:</strong> ${userInfo.id}<br>
                        <hr style="margin: 10px 0;">
                        <small>請將「用戶 ID」複製到桌面應用程式</small>
                    `;
                    document.getElementById('status').appendChild(infoDiv);
                    
                    localStorage.setItem('discord_user_id', userInfo.id);
                    localStorage.setItem('discord_username', userInfo.username);
                    
                } catch (e) {
                    showStatus('獲取用戶資訊失敗: ' + e.message, 'error');
                }
            }
        };
        
        async function fetchUserInfo(accessToken) {
            const response = await fetch('https://discord.com/api/v10/users/@me', {
                headers: {
                    'Authorization': `Bearer ${accessToken}`
                }
            });
            
            if (!response.ok) {
                throw new Error('無法獲取用戶資訊');
            }
            
            return await response.json();
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
        }
    </script>
</body>
</html>
